services:
  postgres:
    image: postgres:15
    shm_size: 128mb
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - C:\docker_volumes\puzzled_postgres:/var/lib/postgresql/data

  adminer:
    image: adminer
    ports:
      - 8080:8080